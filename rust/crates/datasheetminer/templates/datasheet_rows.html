{% if datasheets.is_empty() %}
<tr><td colspan="6"><div class="empty-state"><div class="icon">&#128196;</div><div>No datasheets</div></div></td></tr>
{% else %}
{% for ds in datasheets %}
<tr id="ds-{{ ds.id }}">
  <td>{{ ds.product_name }}</td>
  <td>{{ ds.product_type }}</td>
  <td>{{ ds.product_family }}</td>
  <td>{{ ds.manufacturer }}</td>
  <td><a href="{{ ds.url }}" target="_blank" rel="noopener" style="max-width:200px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ ds.url }}</a></td>
  <td>
    <button class="btn btn-danger btn-sm"
            hx-post="/datasheets/{{ ds.id }}/delete?type={{ ds.product_type }}"
            hx-target="#ds-{{ ds.id }}"
            hx-swap="outerHTML"
            hx-confirm="Delete this datasheet?">&#10005;</button>
  </td>
</tr>
{% endfor %}
{% endif %}
