name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  # ── Stage 1a: Python unit tests ─────────────────────────────────
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Run Python unit tests
        run: uv run pytest tests/unit/ -m "not slow" -v

  # ── Stage 1b: Backend unit tests ────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ── Stage 1c: Frontend unit tests ──────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ── Stage 4: Deploy to production ──────────────────────────────
  deploy:
    name: Deploy to AWS (prod)
    runs-on: ubuntu-latest
    needs: [test-python, test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    outputs:
      api_url: ${{ steps.outputs.outputs.api_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "18"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Install workspace dependencies
        working-directory: app
        run: npm install --silent

      - name: Build frontend (public mode)
        working-directory: app/frontend
        run: VITE_API_URL="" VITE_APP_MODE=public npm run build

      - name: Install CDK dependencies
        working-directory: app/infrastructure
        run: npm ci

      - name: CDK Deploy
        working-directory: app/infrastructure
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
        env:
          STAGE: prod
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          DYNAMODB_TABLE_NAME: ${{ secrets.DYNAMODB_TABLE_NAME || 'products-prod' }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}

      - name: Extract deployed URL
        id: outputs
        working-directory: app/infrastructure
        run: |
          API_URL=$(python3 -c "
          import json, sys
          with open('cdk-outputs.json') as f:
              data = json.load(f)
          for stack in data.values():
              for key, val in stack.items():
                  if 'SiteUrl' in key:
                      print(val); sys.exit()
          for stack in data.values():
              for key, val in stack.items():
                  if 'CloudFrontUrl' in key:
                      print(val); sys.exit()
          ")
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed URL: $API_URL"

  # ── Stage 5: Post-deployment smoke tests ───────────────────────
  smoke:
    name: Smoke Tests (prod)
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Wait for deployment to propagate
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.api_url }}
        run: |
          echo "Waiting for $DEPLOY_URL/health ..."
          for i in $(seq 1 60); do
            if curl -sf "$DEPLOY_URL/health" >/dev/null 2>&1; then
              echo "Health check passed after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run smoke tests
        env:
          API_BASE_URL: ${{ needs.deploy.outputs.api_url }}
        run: uv run pytest tests/post_deploy/ -v
