name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "18"

jobs:
  # ── Stage 1a: Python unit tests ─────────────────────────────────
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Run Python unit tests
        run: uv run pytest tests/unit/ -m "not slow" -v

  # ── Stage 1b: Backend unit tests ────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install workspace dependencies
        working-directory: app
        run: npm ci

      - name: Lint
        working-directory: app/backend
        run: npm run lint

      - name: Test
        working-directory: app/backend
        run: npm test

      - name: Build
        working-directory: app/backend
        run: npm run build

  # ── Stage 1c: Frontend unit tests ──────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install workspace dependencies
        working-directory: app
        run: npm ci

      - name: Lint
        working-directory: app/frontend
        run: npm run lint

      - name: Test
        working-directory: app/frontend
        run: npm test

      - name: Build
        working-directory: app/frontend
        run: npm run build

  # ── Stage 2: Deploy to staging ─────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [test-python, test-backend, test-frontend]
    if: github.ref == 'refs/heads/master'
    environment: staging
    outputs:
      url: ${{ steps.extract.outputs.url }}
      distribution_id: ${{ steps.extract.outputs.distribution_id }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install workspace dependencies
        working-directory: app
        run: npm ci

      - name: Build frontend (public mode)
        working-directory: app/frontend
        run: VITE_API_URL="" VITE_APP_MODE=public npm run build

      - name: Provision SSM secrets
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          SSM_PREFIX="/datasheetminer/prod"

          # Gemini API key (SecureString)
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/gemini-api-key" \
              --type SecureString \
              --value "${{ secrets.GEMINI_API_KEY }}" \
              --overwrite
          fi

          # Stripe Lambda URL (String — not a secret)
          aws ssm put-parameter \
            --name "${SSM_PREFIX}/stripe-lambda-url" \
            --type String \
            --value "${{ secrets.STRIPE_LAMBDA_URL || '' }}" \
            --overwrite

      - name: CDK Deploy (staging)
        working-directory: app/infrastructure
        env:
          STAGE: staging
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json

      - name: Extract outputs
        id: extract
        working-directory: app/infrastructure
        run: |
          URL=$(python3 -c "
          import json, sys
          data = json.load(open('cdk-outputs.json'))
          for stack in data.values():
              for k, v in stack.items():
                  if 'CloudFrontUrl' in k: print(v); sys.exit()
          ")
          DIST_ID=$(python3 -c "
          import json, sys
          data = json.load(open('cdk-outputs.json'))
          for stack in data.values():
              for k, v in stack.items():
                  if 'DistributionId' in k: print(v); sys.exit()
          ")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "Staging URL: $URL"

      - name: Invalidate CloudFront cache
        if: steps.extract.outputs.distribution_id != ''
        run: |
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --id "$INV_ID"

  # ── Stage 3: Smoke tests against staging ───────────────────────
  smoke-staging:
    name: Smoke Staging
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Wait for staging to be healthy
        env:
          URL: ${{ needs.deploy-staging.outputs.url }}
        run: |
          for i in $(seq 1 60); do
            if curl -sf "$URL/health" >/dev/null 2>&1; then
              echo "Healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Staging health check timed out after 60s"
          exit 1

      - name: Run staging contract tests
        env:
          API_BASE_URL: ${{ needs.deploy-staging.outputs.url }}
        run: uv run pytest tests/staging/ -v

      - name: Run smoke tests
        env:
          API_BASE_URL: ${{ needs.deploy-staging.outputs.url }}
        run: uv run pytest tests/post_deploy/ -v

  # ── Stage 4: Deploy to production ──────────────────────────────
  deploy-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: [smoke-staging]
    environment: production
    outputs:
      url: ${{ steps.extract.outputs.url }}
      distribution_id: ${{ steps.extract.outputs.distribution_id }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install workspace dependencies
        working-directory: app
        run: npm ci

      - name: Build frontend (public mode)
        working-directory: app/frontend
        run: VITE_API_URL="" VITE_APP_MODE=public npm run build

      - name: CDK Deploy (prod)
        working-directory: app/infrastructure
        env:
          STAGE: prod
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json

      - name: Extract outputs
        id: extract
        working-directory: app/infrastructure
        run: |
          URL=$(python3 -c "
          import json, sys
          data = json.load(open('cdk-outputs.json'))
          for stack in data.values():
              for k, v in stack.items():
                  if 'SiteUrl' in k: print(v); sys.exit()
          for stack in data.values():
              for k, v in stack.items():
                  if 'CloudFrontUrl' in k: print(v); sys.exit()
          ")
          DIST_ID=$(python3 -c "
          import json, sys
          data = json.load(open('cdk-outputs.json'))
          for stack in data.values():
              for k, v in stack.items():
                  if 'DistributionId' in k: print(v); sys.exit()
          ")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "Production URL: $URL"

      - name: Invalidate CloudFront cache
        if: steps.extract.outputs.distribution_id != ''
        run: |
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --id "$INV_ID"

  # ── Stage 5: Smoke tests against production ────────────────────
  smoke-prod:
    name: Smoke Prod
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Wait for production to be healthy
        env:
          URL: ${{ needs.deploy-prod.outputs.url }}
        run: |
          for i in $(seq 1 60); do
            if curl -sf "$URL/health" >/dev/null 2>&1; then
              echo "Healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Production health check timed out after 60s"
          exit 1

      - name: Run smoke tests
        env:
          API_BASE_URL: ${{ needs.deploy-prod.outputs.url }}
        run: uv run pytest tests/post_deploy/ -v
