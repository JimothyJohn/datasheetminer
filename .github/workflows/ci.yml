name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

# OIDC: deploy jobs assume gh-deploy-datasheetminer via federated identity.
# id-token write is needed by aws-actions/configure-aws-credentials.
permissions:
  contents: read
  id-token: write

# Cancel redundant in-progress runs on the same ref. Master + production
# deploys keep cancel-in-progress=false so a deploy chain isn't aborted
# mid-flight by a follow-up commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  # ── Stage 1a: Python unit tests ─────────────────────────────────
  # Each test-* job delegates to ./Quickstart verify --only <stage> so the
  # local pre-push gate (./Quickstart verify) and CI exercise the same
  # commands. cli/quickstart.py:cmd_verify is the single source of truth.
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Verify (Python)
        run: ./Quickstart verify --only python

  # ── Stage 1b: Backend unit tests ────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install workspace dependencies
        working-directory: app
        run: npm ci

      - name: Verify (backend)
        run: ./Quickstart verify --only backend

  # ── Stage 1c: Frontend unit tests ──────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install workspace dependencies
        working-directory: app
        run: npm ci

      - name: Verify (frontend)
        run: ./Quickstart verify --only frontend

  # ── Stage 2: Deploy to staging ─────────────────────────────────
  # Deploy delegates to ./Quickstart deploy --stage staging so the
  # CI flow matches the local flow exactly (single source of truth).
  # SSM params are stage-scoped: /datasheetminer/staging/*.
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [test-python, test-backend, test-frontend]
    if: github.ref == 'refs/heads/master'
    environment: staging
    outputs:
      url: ${{ steps.extract.outputs.url }}
      distribution_id: ${{ steps.extract.outputs.distribution_id }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install uv (for Quickstart CLI)
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::403059190476:role/gh-deploy-datasheetminer
          aws-region: ${{ env.AWS_REGION }}

      - name: Provision staging SSM params
        env:
          SSM_PREFIX: /datasheetminer/staging
          STRIPE_LAMBDA_URL: ${{ secrets.STRIPE_LAMBDA_URL }}
        run: |
          # Stripe Lambda URL (String, optional). Subscription middleware
          # treats empty/missing as 'unconfigured' and lets requests through.
          # SSM PutParameter rejects empty strings, so skip when unset.
          if [ -n "${STRIPE_LAMBDA_URL:-}" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/stripe-lambda-url" \
              --type String --value "${STRIPE_LAMBDA_URL}" --overwrite
          else
            echo "STRIPE_LAMBDA_URL secret unset — skipping ${SSM_PREFIX}/stripe-lambda-url"
          fi

      - name: Deploy staging via Quickstart
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: ./Quickstart deploy --stage staging

      - name: Extract stack outputs
        id: extract
        working-directory: app/infrastructure
        run: |
          URL=$(python3 -c "
          import json, sys
          data = json.load(open('cdk-outputs.json'))
          for stack in data.values():
              for k, v in stack.items():
                  if 'CloudFrontUrl' in k: print(v); sys.exit()
          ")
          DIST_ID=$(python3 -c "
          import json, sys
          data = json.load(open('cdk-outputs.json'))
          for stack in data.values():
              for k, v in stack.items():
                  if 'DistributionId' in k: print(v); sys.exit()
          ")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "Staging URL: $URL"

      - name: Invalidate CloudFront cache
        if: steps.extract.outputs.distribution_id != ''
        run: |
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --id "$INV_ID"

  # ── Stage 3: Smoke tests against staging ───────────────────────
  smoke-staging:
    name: Smoke Staging
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Wait for /health to go 200
        env:
          URL: ${{ needs.deploy-staging.outputs.url }}
        run: |
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || true)
            if [ "$CODE" = "200" ]; then
              echo "Healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Staging /health returned $CODE after 60s (expected 200)"
          curl -sv "$URL/health" || true
          exit 1

      - name: Run staging contract tests
        env:
          API_BASE_URL: ${{ needs.deploy-staging.outputs.url }}
        run: uv run pytest tests/staging/ -v

      - name: Run smoke tests
        env:
          API_BASE_URL: ${{ needs.deploy-staging.outputs.url }}
        run: uv run pytest tests/post_deploy/ -v

  # ── Stage 4: Deploy to production ──────────────────────────────
  # Gated on smoke-staging success + environment approval.
  deploy-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: [smoke-staging]
    environment: production
    outputs:
      url: ${{ steps.extract.outputs.url }}
      distribution_id: ${{ steps.extract.outputs.distribution_id }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install uv (for Quickstart CLI)
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::403059190476:role/gh-deploy-datasheetminer
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate prod deploy-time secrets
        # Fail fast if required domain config is missing — Quickstart would
        # refuse anyway, but catching it here surfaces it before asset builds.
        run: |
          missing=()
          for s in AWS_ACCOUNT_ID DOMAIN_NAME CERTIFICATE_ARN HOSTED_ZONE_ID; do
            eval "val=\${$s:-}"
            [ -z "$val" ] && missing+=("$s")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required prod secrets: ${missing[*]}"
            exit 1
          fi
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}

      - name: Provision prod SSM params
        env:
          SSM_PREFIX: /datasheetminer/prod
          STRIPE_LAMBDA_URL: ${{ secrets.STRIPE_LAMBDA_URL }}
        run: |
          # See deploy-staging for rationale (empty == unconfigured).
          if [ -n "${STRIPE_LAMBDA_URL:-}" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/stripe-lambda-url" \
              --type String --value "${STRIPE_LAMBDA_URL}" --overwrite
          else
            echo "STRIPE_LAMBDA_URL secret unset — skipping ${SSM_PREFIX}/stripe-lambda-url"
          fi

      - name: Deploy prod via Quickstart
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          HOSTED_ZONE_NAME: ${{ secrets.HOSTED_ZONE_NAME }}
        run: ./Quickstart deploy --stage prod

      - name: Extract stack outputs
        id: extract
        working-directory: app/infrastructure
        run: |
          URL=$(python3 -c "
          import json, sys
          data = json.load(open('cdk-outputs.json'))
          for stack in data.values():
              for k, v in stack.items():
                  if 'SiteUrl' in k: print(v); sys.exit()
          for stack in data.values():
              for k, v in stack.items():
                  if 'CloudFrontUrl' in k: print(v); sys.exit()
          ")
          DIST_ID=$(python3 -c "
          import json, sys
          data = json.load(open('cdk-outputs.json'))
          for stack in data.values():
              for k, v in stack.items():
                  if 'DistributionId' in k: print(v); sys.exit()
          ")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "Production URL: $URL"

      - name: Invalidate CloudFront cache
        if: steps.extract.outputs.distribution_id != ''
        run: |
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --id "$INV_ID"

  # ── Stage 5: Smoke tests against production ────────────────────
  smoke-prod:
    name: Smoke Prod
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Wait for /health to go 200
        env:
          URL: ${{ needs.deploy-prod.outputs.url }}
        run: |
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || true)
            if [ "$CODE" = "200" ]; then
              echo "Healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Production /health returned $CODE after 60s (expected 200)"
          curl -sv "$URL/health" || true
          exit 1

      - name: Run smoke tests
        env:
          API_BASE_URL: ${{ needs.deploy-prod.outputs.url }}
        run: uv run pytest tests/post_deploy/ -v
