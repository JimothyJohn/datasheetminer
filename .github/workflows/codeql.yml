name: CodeQL

# Standard GitHub starter, ~5-min job per language.
# Runs on push to master, on PR, and weekly to catch new advisories
# against unchanged code.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 14 * * 1"   # Mondays 14:00 UTC

permissions:
  contents: read
  security-events: write   # uploads SARIF to the Security tab
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # github/codeql-action pinned to the tip of releases/v3 (v3.35.2
      # backport, 2026-04-15). Refresh: `gh api
      # repos/github/codeql-action/git/refs/tags/v3 --jq '.object.sha'`,
      # then dereference the annotated tag with `gh api
      # repos/github/codeql-action/git/tags/<sha> --jq '.object.sha'` to
      # get the commit SHA.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          languages: ${{ matrix.language }}
          # Use security-and-quality queries for slightly higher signal
          # than security-extended. Drop to security-extended only if the
          # quality queries produce too many low-priority findings.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          category: "/language:${{ matrix.language }}"
